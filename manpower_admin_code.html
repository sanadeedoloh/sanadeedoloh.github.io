<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manpower Local Admin 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scroll-thin-y::-webkit-scrollbar { width: 3px; }
        .scroll-thin-y::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin-y::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;
        const { 
            ChevronLeft, ChevronRight, Clock, X, Plus, Cloud, 
            Table: TableIcon, Trash2, Edit3, Search, Calendar: CalendarIcon,
            Upload, AlertCircle, Users
        } = lucide-react;

        const INITIAL_EVENTS = [
            { id: '1', Asset: 'SLD', day: 1, month: 4, year: 2026, 'Live Time': '10:00', 'End Time': '12:00', 'KOL name': 'Sample KOL 1', Studio: 'Studio 1', 'Tech 1': 'Dee', 'Tech 2': 'Geng' },
            { id: '2', Asset: 'Payday', day: 5, month: 4, year: 2026, 'Live Time': '14:00', 'End Time': '16:00', 'KOL name': 'Sample KOL 2', Studio: 'Studio 2', 'Tech 1': 'Jay', 'Tech 2': 'K' }
        ];

        const TECH_OPTIONS = ["Dee", "Geng", "Jay", "K", "Oat", "PK"];
        const ASSET_TYPES = ['SLD', 'SBD HP#2', 'Payday', 'D-Day', 'MC x Celeb'];
        const STUDIOS = ['Studio 1', 'Studio 2', 'Studio 3', 'Studio 4', 'Studio 5'];
        const MONTHS_MAP = { 'Jan': 0, 'Feb': 1, 'Mar': 2, 'Apr': 3, 'May': 4, 'Jun': 5, 'Jul': 6, 'Aug': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dec': 11 };

        function App() {
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [currentMonth, setCurrentMonth] = useState(new Date(2026, 4, 1)); 
            const [selectedEvent, setSelectedEvent] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [isAdding, setIsAdding] = useState(false);
            const [editForm, setEditForm] = useState(null);
            const [viewMode, setViewMode] = useState('calendar'); 
            const [techView, setTechView] = useState('event'); 
            const [selectedTech, setSelectedTech] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            
            const fileInputRef = useRef(null);

            const calendarDays = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const totalDays = new Date(year, month + 1, 0).getDate();
                return [...Array(firstDay).fill(null), ...Array.from({length: totalDays}, (_, i) => i + 1)];
            }, [currentMonth]);

            const filteredEvents = useMemo(() => {
                let result = [...events];
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    result = result.filter(e => 
                        e['KOL name']?.toLowerCase().includes(s) || 
                        e['Asset']?.toLowerCase().includes(s) ||
                        e['Studio']?.toLowerCase().includes(s)
                    );
                }
                return result.sort((a, b) => (a.month - b.month) || (a.day - b.day));
            }, [events, searchTerm]);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
                    const parsedData = rows.slice(1).map(row => {
                        const values = row.split(',').map(v => v.trim());
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            Asset: values[0] || 'SLD',
                            day: parseInt(values[1]?.split('-')[1]) || 1,
                            month: 4, year: 2026,
                            'Live Time': values[2] || '12:00',
                            'KOL name': values[4] || '',
                            Studio: values[5] || 'Studio 1',
                            'Tech 1': values[6] || '',
                            'Tech 2': values[7] || '',
                        };
                    });
                    setEvents(parsedData);
                };
                reader.readAsText(file);
            };

            const saveEvent = () => {
                if (isAdding) setEvents([...events, { ...editForm, id: Date.now().toString() }]);
                else setEvents(events.map(ev => ev.id === editForm.id ? editForm : ev));
                setIsEditing(false); setIsAdding(false);
            };

            const deleteEvent = (id, e) => {
                if (e) e.stopPropagation();
                if (confirm("ลบข้อมูลนี้ใช่ไหม?")) setEvents(events.filter(ev => ev.id !== id));
            };

            const assetColor = (asset) => {
                if (asset === 'SLD') return 'bg-blue-50 text-blue-700 border-blue-200';
                if (asset === 'Payday') return 'bg-emerald-50 text-emerald-700 border-emerald-200';
                return 'bg-slate-50 text-slate-700 border-slate-200';
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg"><Cloud size={24} /></div>
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter">Manpower <span className="text-indigo-600">Local</span></h1>
                        </div>
                        <div className="flex bg-white p-1 rounded-xl shadow-sm border">
                            <button onClick={() => setViewMode('calendar')} className={`px-4 py-2 rounded-lg text-xs font-bold ${viewMode === 'calendar' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Calendar</button>
                            <button onClick={() => setViewMode('admin')} className={`px-4 py-2 rounded-lg text-xs font-bold ${viewMode === 'admin' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Database</button>
                        </div>
                    </div>

                    {viewMode === 'calendar' ? (
                        <div className="bg-white rounded-[2rem] shadow-xl border overflow-hidden">
                            <div className="grid grid-cols-7 bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase py-4 text-center tracking-widest">
                                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                            </div>
                            <div className="grid grid-cols-7 border-collapse">
                                {calendarDays.map((day, idx) => (
                                    <div key={idx} className="min-h-[150px] border-b border-r p-2 hover:bg-slate-50 transition-colors">
                                        {day && (
                                            <>
                                                <div className="text-xs font-black text-slate-400 mb-2">{day}</div>
                                                <div className="space-y-1">
                                                    {events.filter(e => e.day === day && e.month === currentMonth.getMonth()).map(ev => (
                                                        <div key={ev.id} onClick={() => {setEditForm(ev); setIsEditing(true);}} className={`p-2 rounded-lg border text-[10px] font-bold cursor-pointer transition-transform hover:scale-95 ${assetColor(ev.Asset)}`}>
                                                            <div className="truncate">{ev['KOL name']}</div>
                                                            <div className="flex gap-1 mt-1 opacity-60">
                                                                {[ev['Tech 1'], ev['Tech 2']].filter(Boolean).map((t, i) => <span key={i} className="bg-black/5 px-1 rounded">{t}</span>)}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-2xl shadow border p-6">
                            <div className="flex justify-between mb-4">
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                                <button onClick={() => fileInputRef.current.click()} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold">Import CSV (Overwrite)</button>
                                <button onClick={() => {setEditForm({day:1, month:4, year:2026, Asset:'SLD', 'KOL name':''}); setIsAdding(true); setIsEditing(true);}} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold">+ Add New</button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 text-slate-400 uppercase text-[10px] font-black">
                                        <tr><th className="p-4">KOL</th><th className="p-4">Asset</th><th className="p-4">Staff</th><th className="p-4">Actions</th></tr>
                                    </thead>
                                    <tbody>
                                        {filteredEvents.map(ev => (
                                            <tr key={ev.id} className="border-t hover:bg-slate-50">
                                                <td className="p-4 font-bold">{ev['KOL name']}</td>
                                                <td className="p-4 text-xs">{ev.Asset}</td>
                                                <td className="p-4 text-xs italic text-slate-400">{ev['Tech 1']}, {ev['Tech 2']}</td>
                                                <td className="p-4 flex gap-2">
                                                    <button onClick={() => {setEditForm(ev); setIsEditing(true);}} className="p-1 text-indigo-600"><Edit3 size={14}/></button>
                                                    <button onClick={() => deleteEvent(ev.id)} className="p-1 text-rose-500"><Trash2 size={14}/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Modal แก้ไข */}
                    {isEditing && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                                <h2 className="text-xl font-black mb-4 italic">EDIT DETAILS</h2>
                                <div className="space-y-4">
                                    <input placeholder="KOL Name" className="w-full p-3 border rounded-xl" value={editForm['KOL name']} onChange={e => setEditForm({...editForm, 'KOL name': e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Day" className="p-3 border rounded-xl" value={editForm.day} onChange={e => setEditForm({...editForm, day: parseInt(e.target.value)})} />
                                        <select className="p-3 border rounded-xl" value={editForm.Asset} onChange={e => setEditForm({...editForm, Asset: e.target.value})}>
                                            {ASSET_TYPES.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-3 border rounded-xl" value={editForm['Tech 1']} onChange={e => setEditForm({...editForm, 'Tech 1': e.target.value})}>
                                            <option value="">Tech 1</option>
                                            {TECH_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                        <select className="p-3 border rounded-xl" value={editForm['Tech 2']} onChange={e => setEditForm({...editForm, 'Tech 2': e.target.value})}>
                                            <option value="">Tech 2</option>
                                            {TECH_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-8">
                                    <button onClick={() => setIsEditing(false)} className="flex-1 py-3 font-bold text-slate-400">Cancel</button>
                                    <button onClick={saveEvent} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Save Data</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
